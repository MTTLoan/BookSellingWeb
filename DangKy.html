<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.js"></script>
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="DangKy.css">
    <link rel="stylesheet" href="Header/Header.css">
    <link rel="stylesheet" href="Footer/Footer.css">
    <script src="Header/Header.js" defer></script>
    <script src="Footer/Footer.js" defer></script>
    <script src="DangKy.js" defer></script>
</head>
<body>
    <div id="header"></div>

    <div class="form-container">
        <div class="form-title">ĐĂNG KÝ</div>
        <form id="registrationForm">
            <div class="mb-3">
                <label for="username" class="form-label">Tên tài khoản (*)</label>
                <input type="text" class="form-control" id="username" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="mb-3">
                <label for="fullname" class="form-label">Họ và tên (*)</label>
                <input type="text" class="form-control" id="fullname" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email (*)</label>
                <input type="email" class="form-control" id="email" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Số điện thoại (*)</label>
                <input type="tel" class="form-control" id="phone" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mật khẩu (*)</label>
                <input type="password" class="form-control" id="password" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="mb-3">
                <label for="confirm-password" class="form-label">Nhập lại mật khẩu (*)</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="Mô tả cụ thể tại đây">
            </div>
            <div class="btn-container">
                <button type="button" class="btn btn-cancel" onclick="resetForm()">Hủy</button>
                <button type="submit" class="btn btn-register" onclick="submitForm(event)">Đăng ký</button>
            </div>
        </form>
    </div>
    

    <div id="footer"></div>

    <script>
        // Load header
        fetch('Header/Header.html')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
                // Initialize any components, if needed
            })
            .catch(error => console.error('Error loading header:', error));

        // Load footer
        fetch('Footer/Footer.html')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.text();
            })
            .then(data => {
                document.getElementById('footer').innerHTML = data;
                // Initialize any components, if needed
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>

</body>
</html>
