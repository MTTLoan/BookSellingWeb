<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Header UI</title>
    <link rel="stylesheet" href="header2.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-white bg-white">
        <div class="container-fluid d-flex justify-content-between align-items-center" id="Logo">
            <!-- Logo và tên công ty -->
            <a class="navbar-brand" href="#">
                <img src="ảnh/Favicon.png" alt="" width="40" height="40">
                <span class="company-name">Chapter One</span>
            </a>

            <!-- Thanh tìm kiếm nằm kế logo -->
            <form class="d-flex mx-auto flex-grow-1 mx-2 justify-content-center">
                <input class="form-control search-input" type="search" placeholder="Tìm kiếm sản phẩm..." aria-label="Search">
                <button class="btn search-btn" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </form>

            <div class="navbar-nav">
                <button class="btn user-icon">
                    <i class="bi bi-person-fill"></i>
                </button>

                <button class="btn cart-icon">
                    <i class="bi bi-bag-heart-fill"></i>
                </button>
            </div>
        </div>
    </nav>
  
</body>
</html>
