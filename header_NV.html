<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Header UI</title>
    <link rel="stylesheet" href="header_NV.css">
    <script src="header_NV.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-sm navbar-white bg-white">
        <div class="container-fluid d-flex justify-content-between align-items-center" id="Logo">
            <button class="navbar-toggler me-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <i class="bi bi-list"></i>
            </button>
    
            <a class="navbar-brand" href="#">
                <img src="ảnh/Favicon.png" alt="" width="40" height="40">
                <span class="company-name">Chapter One</span>
            </a>
    
            <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
                <ul class="navbar-nav d-flex align-items-center">
                    <li class="nav-item me-3 d-flex align-items-center">
                        <label class="branch-label me-1">Chi nhánh trung tâm:</label>
                        <button class="nav-link icon-button" id="branchButton">
                            <i class="bi bi-geo-alt"></i>
                        </button>
                    </li>
    
                    <li class="nav-item me-3">
                        <button class="nav-link icon-button" id="emailButton">
                            <i class="bi bi-envelope"></i>
                        </button>
                    </li>
    
                    <li class="nav-item me-3">
                        <button class="nav-link icon-button" id="settingsButton">
                            <i class="bi bi-gear"></i>
                        </button>
                    </li>
    
                    <li class="nav-item d-flex align-items-center">
                        <span class="account-name me-1">Tài khoản</span>
                        <button class="nav-link icon-button" id="accountButton">
                            <i class="bi bi-person-circle"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
